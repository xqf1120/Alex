<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOS 营销中台 · 保险获客工作台</title>
<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { height: 100%; overflow: hidden; }
body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; }

/* ── Layout shell ── */
.kos-shell { display: flex; height: 100vh; overflow: hidden; background: #f7f8fa; }

/* ── Sidebar ── */
.kos-sider {
  width: 200px; flex-shrink: 0;
  background: #fff; border-right: 1px solid #e5e6eb;
  display: flex; flex-direction: column; height: 100vh; overflow: hidden;
}
.kos-logo {
  padding: 14px 16px; border-bottom: 1px solid #e5e6eb;
  display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.kos-logo-mark {
  width: 32px; height: 32px; border-radius: 8px;
  display: block; flex-shrink: 0; object-fit: cover;
}
.kos-nav-new {
  margin: 10px 10px 4px; height: 34px;
  background: #165DFF; color: #fff; border: none;
  border-radius: 8px; font-size: 13px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 5px;
  font-family: inherit; font-weight: 500; transition: background .15s; flex-shrink: 0;
}
.kos-nav-new:hover { background: #0e42d2; }
.recent-chat-box { margin: 8px 8px 6px; padding: 8px; border: 1px solid #f2f3f5; border-radius: 8px; background: #fafbfc; flex-shrink: 0; }
.recent-chat-title { font-size: 10px; color: #86909c; font-weight: 800; letter-spacing: .05em; margin: 0 4px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; }
.recent-chat-toggle { font-size: 11px; color:#86909c; font-weight:800; }
.recent-chat-list { margin-top:6px; }
.recent-chat-item { display: grid; grid-template-columns: 18px minmax(0, 1fr); gap: 6px; align-items: center; padding: 6px 5px; border-radius: 6px; cursor: pointer; color: #4e5969; transition: all .12s; }
.recent-chat-item:hover { background:#e8f3ff; color:#165DFF; }
.recent-chat-icon { font-size: 12px; text-align: center; }
.recent-chat-main { min-width:0; }
.recent-chat-name { font-size: 11px; font-weight: 700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.recent-chat-time { font-size: 9px; color:#86909c; margin-top:1px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.kos-nav-scroll { flex: 1; overflow-y: auto; padding: 4px 0 8px; }
.kos-nav-label {
  font-size: 10px; color: #86909c; font-weight: 700;
  letter-spacing: .06em; padding: 8px 18px 4px;
}
.kos-nav-item {
  display: grid; grid-template-columns: 20px minmax(0, 1fr) auto; align-items: center; column-gap: 8px;
  padding: 7px 10px; margin: 1px 8px; border-radius: 6px;
  font-size: 13px; cursor: pointer; transition: all .12s;
  color: #4e5969;
}
.kos-nav-item:hover { background: #f2f3f5; color: #1d2129; }
.kos-nav-item.active { background: #e8f3ff; color: #165DFF; font-weight: 600; }
.kos-nav-item .nav-icon { width: 20px; height:20px; display:flex; align-items:center; justify-content:center; color:inherit; }
.kos-nav-item .nav-icon svg { width:16px; height:16px; display:block; }
.kos-nav-item .nav-icon.line svg { fill:none; stroke:currentColor; stroke-width:1.9; stroke-linecap:round; stroke-linejoin:round; }
.kos-nav-item .nav-icon.solid svg { fill:currentColor; stroke:none; }
.kos-nav-item .nav-badge {
  font-size: 10px; background: #f53f3f; color: #fff;
  border-radius: 10px; padding: 1px 6px; font-weight: 700;
}
.kos-user-footer {
  padding: 11px 14px; border-top: 1px solid #e5e6eb;
  display: flex; align-items: center; gap: 9px; flex-shrink: 0;
}
.kos-avatar {
  width: 30px; height: 30px; border-radius: 50%;
  background: #e8f3ff; color: #165DFF;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0;
}

/* ── Main ── */
.kos-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.hot-capture-wrap { position:relative; margin-left:auto; }
.hot-capture-btn { height:30px; padding:0 12px; border-radius:8px; border:1px solid #ffd591; background:#fff7e8; color:#d46b08; font-size:12px; font-weight:700; display:flex; align-items:center; gap:7px; cursor:pointer; font-family:inherit; }
.hot-capture-btn:hover { border-color:#ff9a2e; background:#fff1d6; }
.hot-capture-dot { min-width:16px; height:16px; border-radius:8px; background:#f53f3f; color:#fff; display:inline-flex; align-items:center; justify-content:center; font-size:10px; }
.hot-capture-panel { position:absolute; right:0; top:36px; width:320px; background:#fff; border:1px solid #e5e6eb; border-radius:10px; box-shadow:0 14px 34px rgba(15,23,42,.14); z-index:30; overflow:hidden; }
.hot-capture-head { padding:12px 14px; border-bottom:1px solid #f2f3f5; display:flex; align-items:center; justify-content:space-between; }
.hot-capture-title { font-size:13px; font-weight:800; color:#1d2129; }
.hot-capture-sub { font-size:10px; color:#86909c; margin-top:2px; }
.hot-capture-list { max-height:310px; overflow-y:auto; }
.hot-capture-item { padding:11px 14px; border-bottom:1px solid #f2f3f5; cursor:pointer; }
.hot-capture-item:hover { background:#f7f8fa; }
.hot-capture-item:last-child { border-bottom:none; }
.hot-capture-time { font-size:10px; color:#86909c; margin-bottom:5px; }
.hot-capture-name { font-size:12px; font-weight:700; color:#1d2129; line-height:1.45; margin-bottom:6px; }
.hot-capture-meta { display:flex; gap:6px; flex-wrap:wrap; }
.hot-capture-tag { font-size:10px; color:#165DFF; background:#e8f3ff; border-radius:8px; padding:2px 6px; font-weight:700; }

/* ── Page wrappers ── */
.kos-page { display: none; flex: 1; overflow: hidden; }
.kos-page.active { display: flex; }
.kos-page.scroll { display: none; flex: 1; overflow-y: auto; }
.kos-page.scroll.active { display: block; }

/* ── Chat page ── */
.chat-layout { display: flex; flex: 1; overflow: hidden; }

.persona-rail {
  width: 118px; flex-shrink: 0; border-right: 1px solid #e5e6eb;
  background: #fff; padding: 16px 8px; overflow-y: auto;
}
.persona-rail-label { font-size: 10px; color: #86909c; font-weight: 700; letter-spacing:.05em; margin-bottom: 10px; padding: 0 4px; }
.persona-card {
  display: flex; flex-direction: column; align-items: center; text-align: center;
  gap: 5px; border: 1.5px solid transparent; border-radius: 10px;
  padding: 10px 6px; margin-bottom: 8px; cursor: pointer; transition: all .15s;
}
.persona-card:hover { background: #f2f3f5; }
.persona-card.active { border-color: #165DFF; background: #e8f3ff; }
.persona-avatar-wrap {
  width: 36px; height: 36px; border-radius: 50%;
  background: #f2f3f5; display: flex; align-items: center;
  justify-content: center; font-size: 19px; overflow:hidden;
  box-shadow: inset 0 0 0 1px rgba(22,93,255,.08);
}
.persona-card.active .persona-avatar-wrap { background: #fff; }
.persona-avatar-img { width:100%; height:100%; object-fit:cover; display:block; border-radius:50%; }
.persona-card-name { font-size: 11px; font-weight: 600; line-height: 1.3; color: #1d2129; }
.persona-card.active .persona-card-name { color: #165DFF; }

.chat-center { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: #f7f8fa; }
.chat-body { flex: 1; overflow-y: auto; padding: 28px 36px 16px; }
.chat-welcome { margin-bottom: 24px; }
.chat-welcome-row { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; }
.chat-welcome h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; letter-spacing: -.02em; }
.chat-welcome p { font-size: 13px; color: #86909c; line-height: 1.6; margin-bottom: 24px; }

.quick-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 24px; }
.quick-card {
  background: #fff; border: 1px solid #e5e6eb; border-radius: 10px;
  padding: 12px; cursor: pointer; display: flex; align-items: flex-start;
  gap: 10px; transition: all .15s;
}
.quick-card:hover { border-color: #165DFF; box-shadow: 0 0 0 3px rgba(22,93,255,.07); }
.quick-icon {
  width: 36px; height: 36px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; overflow:hidden; background:#f7f8fa;
  box-shadow: inset 0 0 0 1px rgba(22,93,255,.06);
}
.quick-icon-img { width:100%; height:100%; object-fit:cover; display:block; }
.quick-card-label { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
.quick-card-sub { font-size: 11px; color: #86909c; }

/* messages */
.msg-row { display: flex; gap: 10px; margin-bottom: 16px; align-items: flex-start; animation: msgIn .2s ease; }
@keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
.msg-row.user { flex-direction: row-reverse; }
.msg-av { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
.msg-av.ai { background: #e8f3ff; color: #165DFF; }
.msg-av.user { background: #165DFF; color: #fff; }
.msg-content { display: flex; flex-direction: column; align-items: flex-start; max-width: 82%; }
.msg-row.user .msg-content { align-items: flex-end; }
.msg-bubble {
  border-radius: 12px; padding: 10px 14px; font-size: 13px;
  line-height: 1.8; max-width: 100%; white-space: pre-wrap;
}
.msg-bubble.ai { background: #fff; border: 1px solid #e5e6eb; color: #1d2129; }
.msg-bubble.user { background: #165DFF; color: #fff; }
.comply-badge {
  display: inline-flex; align-items: center; gap: 4px; font-size: 11px;
  padding: 2px 7px; border-radius: 4px; margin-top: 6px; font-weight: 500;
  background: #e8ffea; color: #00b42a;
}
.think-block {
  margin-top: 8px; background: #e8f3ff; border-radius: 8px;
  padding: 10px 12px; font-size: 12px; color: #1d5bd8; line-height: 1.7;
  border-left: 3px solid #165DFF;
}
.think-block-label { font-size: 11px; font-weight: 700; margin-bottom: 5px; color: #165DFF; }

/* input area */
.chat-input-area {
  padding: 12px 16px; border-top: 1px solid #e5e6eb;
  background: #fff; flex-shrink: 0;
}
.input-box-wrap {
  border: 1px solid #dcdfe6; border-radius: 10px;
  overflow: hidden; background: #fff; transition: border-color .15s, box-shadow .15s;
}
.input-box-wrap:focus-within { border-color: #165DFF; box-shadow: 0 0 0 1px rgba(22,93,255,.08); }
.input-mode-tabs { display: flex; border-bottom: 1px solid #e5e6eb; padding: 0 10px; }
.imt {
  font-size: 12px; padding: 7px 10px; cursor: pointer;
  color: #86909c; border-bottom: 2px solid transparent;
  margin-bottom: -1px; font-weight: 500; transition: all .12s;
}
.imt.active { color: #165DFF; border-bottom-color: #165DFF; }
.chat-ta {
  width: 100%; border: none; resize: none; padding: 10px 12px;
  font-size: 13px; background: transparent; color: #1d2129;
  outline: none; height: 72px; font-family: inherit; line-height: 1.6;
}
.input-footer-row {
  display: flex; align-items: center; padding: 6px 10px;
  gap: 6px; border-top: 1px solid #e5e6eb;
}
.attach-btn-mini {
  height: 26px; padding: 0 8px; border-radius: 6px; font-size: 11px;
  cursor: pointer; display: inline-flex; align-items: center; gap: 3px;
  border: 1px solid #e5e6eb; background: #fff; color: #4e5969;
  font-family: inherit; font-weight: 500; transition: all .12s;
}
.attach-btn-mini:hover { border-color: #165DFF; color: #165DFF; }
.send-circle-btn {
  width: 32px; height: 32px; border-radius: 50%; background: #165DFF;
  border: none; cursor: pointer; display: flex; align-items: center;
  justify-content: center; color: #fff; font-size: 14px;
  transition: background .12s; flex-shrink: 0;
}
.send-circle-btn:hover { background: #0e42d2; }
.send-circle-btn:disabled { background: #c9cdd4; cursor: not-allowed; }
.input-hint { font-size: 11px; color: #c9cdd4; margin-top: 6px; text-align: center; }

/* right tools */
.right-tools {
  width: 62px; flex-shrink: 0; border-left: 1px solid #e5e6eb;
  background: #fff; display: flex; flex-direction: column;
  align-items: center; padding: 8px 0; gap: 3px; overflow-y: auto;
}
.rt-btn {
  width: 50px; min-height: 48px; border-radius: 8px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; color: #86909c; gap: 3px; padding: 5px 2px;
  transition: all .12s; position: relative; flex-shrink: 0;
}
.rt-btn:hover, .rt-btn.active { background: #e8f3ff; color: #165DFF; }
.rt-sep { width: 24px; height: 1px; background: #e5e6eb; margin: 4px 0; flex-shrink: 0; }
.rt-icon { font-size: 16px; line-height: 1; }
.rt-label { font-size: 10px; line-height: 1.15; font-weight: 600; max-width: 46px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── Data page ── */
.data-layout { display: flex; flex: 1; overflow: hidden; }
.data-accts-panel {
  width: 172px; flex-shrink: 0; border-right: 1px solid #e5e6eb;
  background: #fff; overflow-y: auto;
}
.data-accts-title {
  font-size: 11px; font-weight: 700; color: #86909c;
  letter-spacing: .05em; padding: 12px 14px 6px;
}
.data-platform-sep { height: 1px; background: #e5e6eb; margin: 5px 14px; }
.data-platform-label {
  font-size: 10px; font-weight: 700; color: #86909c;
  letter-spacing: .04em; padding: 6px 14px 3px;
  display: flex; align-items: center; gap: 5px;
}
.data-acct-row {
  display: grid; grid-template-columns: 10px minmax(0, 1fr); align-items: flex-start; column-gap: 8px;
  padding: 8px 14px; cursor: pointer; border-left: 3px solid transparent;
  transition: all .12s;
}
.data-acct-row:hover { background: #f7f8fa; }
.data-acct-row.active { background: #e8f3ff; border-left-color: #165DFF; }
.data-acct-dot { width: 7px; height: 7px; border-radius: 50%; margin-top: 5px; justify-self: center; }
.data-acct-name {
  font-size: 12px; font-weight: 500; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap;
}
.data-acct-row.active .data-acct-name { color: #165DFF; font-weight: 700; }
.data-acct-sub { font-size: 10px; color: #86909c; margin-top: 1px; }

.data-main-area { --data-two-col: minmax(0, 1.2fr) minmax(0, 1fr); flex: 1; overflow-y: auto; padding: 16px 20px; background: #f7f8fa; }
.data-dashboard-frame { flex: 1; min-width: 0; overflow: hidden; background: #f4f6fb; }
.data-dashboard-frame iframe { width: 100%; height: 100%; border: 0; display: block; background: #f4f6fb; }

/* KPI cards */
.kpi-row { display: grid; grid-template-columns: repeat(5,1fr); gap: 10px; margin-bottom: 14px; }
.kpi-card { background: #fff; border: 1px solid #e5e6eb; border-radius: 10px; padding: 14px 16px; }
.kpi-label { font-size: 11px; color: #86909c; font-weight: 500; letter-spacing: .03em; margin-bottom: 6px; }
.kpi-value { font-size: 26px; font-weight: 700; letter-spacing: -.02em; line-height: 1; color: #1d2129; margin-bottom: 5px; }
.kpi-change { font-size: 11px; display: flex; align-items: center; gap: 3px; }
.kpi-up { color: #00b42a; }
.kpi-dn { color: #f53f3f; }
.kpi-flat { color: #86909c; }

/* charts */
.charts-row { display: grid; grid-template-columns: var(--data-two-col); gap: 12px; margin-bottom: 14px; }
.chart-card { background: #fff; border: 1px solid #e5e6eb; border-radius: 10px; padding: 14px; min-width: 0; }
.chart-title { font-size: 13px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
.chart-title-sub { font-size: 11px; color: #86909c; font-weight: 400; }
.bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 90px; }
.bar-col-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; }
.bar-item { width: 100%; border-radius: 3px 3px 0 0; min-height: 4px; transition: height .3s ease; }
.bar-xhs { background: #F53F3F; }
.bar-dy { background: #1D2129; }
.bar-all { background: #165DFF; }
.bar-day { font-size: 9px; color: #86909c; }
.bar-val { font-size: 9px; color: #4e5969; font-weight: 500; }
.pcomp-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.pcomp-name { font-size: 12px; font-weight: 600; min-width: 55px; }
.pcomp-bg { flex: 1; height: 8px; background: #f2f3f5; border-radius: 4px; overflow: hidden; }
.pcomp-fill { height: 8px; border-radius: 4px; transition: width .4s ease; }
.pcomp-val { font-size: 12px; font-weight: 600; min-width: 48px; text-align: right; }

/* insurance business data */
.insurance-row { display:grid; grid-template-columns:var(--data-two-col); gap:12px; margin-bottom:14px; }
.funnel-card, .product-card { background:#fff; border:1px solid #e5e6eb; border-radius:10px; padding:14px; min-width:0; }
.funnel-steps { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:9px; }
.funnel-step { border:1px solid #e5e6eb; border-radius:8px; padding:10px 12px; background:#fafbfc; position:relative; min-height:74px; }
.funnel-step::after { content:'>'; position:absolute; right:-7px; top:50%; transform:translateY(-50%); color:#c9cdd4; font-size:12px; font-weight:800; }
.funnel-step:nth-child(2n)::after { display:none; }
.funnel-step:last-child::after { display:none; }
.funnel-label { font-size:11px; color:#86909c; font-weight:700; margin-bottom:6px; }
.funnel-value { font-size:20px; color:#1d2129; font-weight:800; line-height:1; margin-bottom:5px; }
.funnel-sub { font-size:10px; color:#165DFF; font-weight:700; line-height:1.4; }
.product-list { display:flex; flex-direction:column; gap:9px; }
.product-row { display:grid; grid-template-columns:minmax(0,1fr) 72px 82px; gap:10px; align-items:center; }
.product-name { font-size:12px; font-weight:800; color:#1d2129; margin-bottom:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.product-sub { font-size:10px; color:#86909c; }
.product-bar-bg { height:7px; background:#f2f3f5; border-radius:4px; overflow:hidden; margin-top:6px; }
.product-bar-fill { height:7px; border-radius:4px; background:#165DFF; }
.product-num { font-size:12px; font-weight:800; color:#1d2129; text-align:right; }
.product-premium { font-size:12px; color:#f53f3f; font-weight:800; text-align:right; }

/* peer section */
.peer-section { background: #fff; border: 1px solid #e5e6eb; border-radius: 10px; padding: 14px; margin-bottom: 14px; }
.peer-sec-title { font-size: 13px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
.peer-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.peer-card {
  background: #f7f8fa; border: 1px solid #e5e6eb; border-radius: 10px;
  padding: 12px; cursor: pointer; transition: all .15s;
}
.peer-card:hover { border-color: #165DFF; background: #e8f3ff; box-shadow: 0 0 0 3px rgba(22,93,255,.06); }
.peer-rank-dot {
  width: 22px; height: 22px; border-radius: 50%;
  background: #ffece8; color: #f53f3f;
  font-size: 11px; font-weight: 800;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.peer-card-title { font-size: 12px; font-weight: 700; line-height: 1.45; margin-bottom: 5px; }
.peer-card-meta { font-size: 11px; color: #86909c; margin-bottom: 8px; }
.peer-card-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 8px; }
.peer-card-tag {
  font-size: 10px; padding: 2px 7px; border-radius: 10px;
  background: #e8f3ff; color: #165DFF; font-weight: 500;
}
.peer-card-tip { font-size: 10px; color: #86909c; }
.peer-actions { display: flex; gap: 6px; margin-top: 8px; }

/* content table */
.data-table-section { background: #fff; border: 1px solid #e5e6eb; border-radius: 10px; padding: 14px; }
.data-table-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.data-table-hdr-title { font-size: 13px; font-weight: 700; }
.data-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
.data-table th {
  font-size: 11px; font-weight: 600; color: #86909c;
  padding: 7px 10px; text-align: left;
  border-bottom: 1px solid #e5e6eb; letter-spacing: .03em;
}
.data-table td { font-size: 12px; padding: 10px 10px; border-bottom: 1px solid #f2f3f5; vertical-align: middle; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: #f7f8fa; }
.status-hot { display: inline-flex; align-items: center; gap: 3px; background: #fff0f0; color: #f53f3f; padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 600; }
.status-good { display: inline-flex; align-items: center; gap: 3px; background: #e8ffea; color: #00b42a; padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 600; }
.status-norm { display: inline-flex; align-items: center; gap: 3px; background: #f2f3f5; color: #86909c; padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 500; }
.plat-tag-xhs { background: #fff0f0; color: #f53f3f; padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 600; }
.plat-tag-dy  { background: #f2f3f5; color: #1d2129; padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 600; }
.imitate-btn {
  font-size: 11px; color: #165DFF; cursor: pointer;
  background: none; border: none; font-family: inherit; padding: 0;
}
.imitate-btn:hover { text-decoration: underline; }

/* ── Modals ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(15,23,42,.35);
  z-index: 900; display: flex; align-items: center; justify-content: center; padding: 24px;
  animation: fadeIn .15s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal-card {
  background: #fff; border-radius: 12px; border: 1px solid #e5e6eb;
  box-shadow: 0 18px 50px rgba(15,23,42,.18); overflow: hidden; animation: scaleIn .2s ease;
}
@keyframes scaleIn { from { opacity: 0; transform: scale(.96); } to { opacity: 1; transform: scale(1); } }
.modal-head {
  padding: 14px 18px; border-bottom: 1px solid #e5e6eb;
  display: flex; align-items: flex-start; gap: 10px;
}
.modal-close {
  margin-left: auto; border: none; background: #f2f3f5;
  width: 28px; height: 28px; border-radius: 50%;
  cursor: pointer; color: #86909c; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.modal-close:hover { background: #e5e6eb; }
.modal-body { padding: 14px 18px; }
.modal-footer { padding: 12px 18px; border-top: 1px solid #e5e6eb; display: flex; gap: 8px; justify-content: flex-end; }

/* ── Viral float card ── */
.viral-float {
  position: fixed; bottom: 24px; right: 24px; width: 320px;
  background: #fff; border: 1px solid #e5e6eb; border-radius: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,.14); z-index: 800; overflow: hidden;
  animation: slideUp .3s ease;
}
@keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
.viral-float-head {
  padding: 10px 14px; border-bottom: 1px solid #e5e6eb;
  background: linear-gradient(90deg, #fff7e8, #fff);
  display: flex; align-items: center; gap: 8px;
}
.viral-float-body { padding: 12px 14px; }
.viral-float-foot { padding: 10px 14px; border-top: 1px solid #e5e6eb; display: flex; gap: 8px; justify-content: flex-end; }

/* ── Placeholder page ── */
.placeholder-page {
  flex: 1; display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px; background: #f7f8fa;
}
.workbench-strip { display:flex; gap:8px; flex-wrap:wrap; margin:-12px 0 18px; }
.workbench-chip { background:#fff; border:1px solid #e5e6eb; border-radius:8px; padding:8px 11px; font-size:12px; color:#4e5969; display:flex; align-items:center; gap:6px; font-weight:600; cursor:pointer; transition:all .12s; }
.workbench-chip:hover { border-color:#165DFF; color:#165DFF; background:#e8f3ff; }
.mode-helper { padding:8px 12px; border-bottom:1px solid #f2f3f5; display:flex; align-items:center; gap:8px; background:#fafbfc; font-size:11px; color:#4e5969; }
.mode-helper-tag { padding:2px 7px; border-radius:10px; font-size:10px; font-weight:700; background:#e8f3ff; color:#165DFF; }
.embedded-panel { padding:10px 12px; border-bottom:1px solid #f2f3f5; background:#fff; }
.embedded-panel-title { font-size:11px; color:#86909c; font-weight:800; margin-bottom:8px; letter-spacing:.02em; }
.embedded-chip-row { display:flex; gap:6px; flex-wrap:wrap; }
.embedded-chip { height:28px; padding:0 10px; border-radius:14px; border:1px solid #e5e6eb; background:#fff; color:#4e5969; font-size:11px; font-weight:600; cursor:pointer; font-family:inherit; }
.embedded-chip:hover { border-color:#165DFF; color:#165DFF; background:#e8f3ff; }
.persona-config-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.persona-config-card { border:1px solid #e5e6eb; border-radius:8px; padding:9px 10px; background:#fafbfc; min-height:66px; }
.persona-config-label { font-size:10px; color:#86909c; font-weight:800; margin-bottom:5px; }
.persona-config-value { font-size:12px; color:#1d2129; line-height:1.5; font-weight:600; }
.url-learn-row { margin-top:8px; display:flex; gap:6px; align-items:center; }
.url-learn-input { flex:1; height:30px; border:1px solid #e5e6eb; border-radius:7px; padding:0 10px; font-size:11px; outline:none; font-family:inherit; }
.url-learn-input:focus { border-color:#165DFF; }
.speech-card-row { padding:10px 14px; border-top:1px solid #f2f3f5; background:#fafbfc; }
.speech-card-title { font-size:11px; color:#86909c; font-weight:800; margin-bottom:8px; }
.speech-card-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:8px; }
.speech-card { min-height:30px; padding:0 9px; border-radius:7px; border:1px solid #e5e6eb; background:#fff; color:#4e5969; font-size:11px; font-weight:600; cursor:pointer; font-family:inherit; white-space:normal; line-height:1.3; }
.speech-card:hover { border-color:#165DFF; color:#165DFF; background:#e8f3ff; }
.intent-detail { padding:8px 14px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; border-bottom:1px solid #f2f3f5; background:#fff; }
.intent-detail-title { font-size:11px; color:#86909c; font-weight:700; }
.intent-score-chip { font-size:10px; padding:2px 7px; border-radius:10px; background:#f2f3f5; color:#4e5969; font-weight:600; }
.wake-gradient { display:flex; gap:6px; align-items:center; font-size:11px; color:#86909c; padding:8px 14px; border-bottom:1px solid #f2f3f5; background:#fff7e8; }
.wake-step { padding:3px 8px; border-radius:12px; background:#fff; border:1px solid #ffd591; color:#874d00; font-weight:700; }

/* ── 潜客公海池 / 跟进任务 ── */
.ops-page { flex:1; overflow-y:auto; padding:20px 24px; background:#f7f8fa; }
.ops-head { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
.ops-title { font-size:16px; font-weight:800; color:#1d2129; }
.ops-sub { font-size:12px; color:#86909c; margin-top:3px; }
.ops-kpis { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:14px; }
.ops-kpi { background:#fff; border:1px solid #e5e6eb; border-radius:10px; padding:12px 14px; }
.ops-kpi-label { font-size:11px; color:#86909c; margin-bottom:5px; }
.ops-kpi-val { font-size:22px; font-weight:800; color:#1d2129; }
.pool-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.pool-card, .task-card { background:#fff; border:1px solid #e5e6eb; border-radius:10px; padding:14px; transition:all .15s; }
.pool-card:hover, .task-card:hover { border-color:#165DFF; box-shadow:0 0 0 3px rgba(22,93,255,.06); }
.pool-card-top { display:flex; align-items:flex-start; gap:10px; margin-bottom:10px; }
.pool-avatar { width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:800; flex-shrink:0; }
.pool-name { font-size:14px; font-weight:800; margin-bottom:3px; }
.pool-meta { font-size:11px; color:#86909c; line-height:1.5; }
.pool-tags { display:flex; gap:5px; flex-wrap:wrap; margin:8px 0; }
.pool-tag { font-size:10px; padding:2px 7px; border-radius:10px; font-weight:700; background:#e8f3ff; color:#165DFF; }
.pool-tag.red { background:#fff0f0; color:#f53f3f; }
.pool-tag.green { background:#e8ffea; color:#00b42a; }
.pool-tag.gray { background:#f2f3f5; color:#86909c; }
.pool-path { background:#f7f8fa; border-radius:8px; padding:8px 10px; font-size:11px; color:#4e5969; line-height:1.7; margin-bottom:10px; }
.pool-actions { display:flex; gap:7px; align-items:center; }
.primary-mini { height:30px; padding:0 12px; border:none; border-radius:7px; background:#165DFF; color:#fff; font-size:12px; font-weight:700; cursor:pointer; font-family:inherit; }
.secondary-mini { height:30px; padding:0 12px; border:1px solid #e5e6eb; border-radius:7px; background:#fff; color:#4e5969; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; }
.task-lanes { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
.task-lane { background:#fff; border:1px solid #e5e6eb; border-radius:10px; padding:12px; min-height:360px; }
.task-lane-title { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; font-size:13px; font-weight:800; }
.task-card { margin-bottom:10px; padding:12px; }
.task-row { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:7px; }
.task-name { font-size:13px; font-weight:700; }
.task-desc { font-size:11px; color:#86909c; line-height:1.6; margin-bottom:8px; }
.task-badge { font-size:10px; padding:2px 7px; border-radius:10px; background:#fff7e8; color:#ff7d00; font-weight:700; }

/* ── Arco overrides ── */
.arco-btn-primary { background: #165DFF !important; border-color: #165DFF !important; }
.arco-btn-primary:hover { background: #0e42d2 !important; border-color: #0e42d2 !important; }
.arco-tag-blue { background: #e8f3ff !important; color: #165DFF !important; border-color: #bcd1ff !important; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #c9cdd4; border-radius: 2px; }

/* ── 消息收件箱 ── */
.inbox-layout { display:flex; flex:1; overflow:hidden; }
.inbox-list { width:280px; flex-shrink:0; border-right:1px solid #e5e6eb; background:#fff; display:flex; flex-direction:column; overflow:hidden; }
.inbox-list-head { padding:12px 14px; border-bottom:1px solid #e5e6eb; display:flex; align-items:center; gap:8px; flex-shrink:0; }
.inbox-filter { display:flex; gap:4px; padding:8px 10px; border-bottom:1px solid #f2f3f5; flex-shrink:0; }
.inbox-filter-chip { padding:3px 10px; border-radius:12px; font-size:11px; font-weight:500; cursor:pointer; border:1px solid #e5e6eb; background:#fff; color:#4e5969; transition:all .12s; }
.inbox-filter-chip.active { background:#165DFF; color:#fff; border-color:#165DFF; }
.inbox-conv-list { flex:1; overflow-y:auto; }
.inbox-conv-item { padding:9px 14px; border-bottom:1px solid #f2f3f5; cursor:pointer; transition:background .1s; }
.inbox-conv-item:hover { background:#f7f8fa; }
.inbox-conv-item.active { background:#e8f3ff; }
.inbox-conv-top { display:flex; align-items:flex-start; gap:8px; margin-bottom:0; }
.inbox-conv-av { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; font-weight:700; overflow:hidden; box-shadow:inset 0 0 0 1px rgba(22,93,255,.08); }
.inbox-avatar-img { width:100%; height:100%; object-fit:cover; border-radius:50%; display:block; }
.inbox-conv-body { flex:1; min-width:0; display:flex; flex-direction:column; gap:3px; }
.inbox-conv-name-line { display:flex; align-items:center; min-width:0; }
.inbox-conv-name { font-size:13px; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.inbox-platform-tag { font-size:9px; padding:2px 6px; border-radius:8px; background:#f2f3f5; font-weight:700; flex-shrink:0; }
.inbox-conv-time { font-size:10px; color:#86909c; flex-shrink:0; }
.inbox-conv-preview { font-size:11px; color:#86909c; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; padding-left:0; margin-top:0; line-height:1.35; }
.inbox-conv-badges { display:flex; gap:4px; flex-wrap:wrap; padding-left:0; margin-top:1px; }
.intent-badge { font-size:9px; padding:2px 6px; border-radius:8px; font-weight:700; }
.intent-high { background:#fff0f0; color:#f53f3f; }
.intent-mid  { background:#e8f3ff; color:#165DFF; }
.intent-low  { background:#f2f3f5; color:#86909c; }
.wake-badge { font-size:9px; padding:2px 6px; border-radius:8px; font-weight:600; background:#fff7e8; color:#ff7d00; }
/* 会话区域 */
.inbox-thread { flex:1; display:flex; flex-direction:column; overflow:hidden; background:#f7f8fa; }
.inbox-thread-head { padding:12px 16px; background:#fff; border-bottom:1px solid #e5e6eb; display:flex; align-items:center; gap:10px; flex-shrink:0; }
.inbox-msgs { flex:1; overflow-y:auto; padding:14px 20px; }
.inbox-msg-item { display:flex; gap:6px; margin-bottom:12px; align-items:flex-start; }
.inbox-msg-item.self { flex-direction:row-reverse; }
.inbox-msg-av { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; flex-shrink:0; overflow:hidden; box-shadow:inset 0 0 0 1px rgba(22,93,255,.08); }
.inbox-msg-content { display:flex; flex-direction:column; align-items:flex-start; max-width:72%; }
.inbox-msg-item.self .inbox-msg-content { align-items:flex-end; }
.inbox-msg-bubble { border-radius:12px; padding:9px 13px; font-size:13px; line-height:1.75; max-width:100%; }
.inbox-msg-bubble.other { background:#fff; border:1px solid #e5e6eb; }
.inbox-msg-bubble.self  { background:#165DFF; color:#fff; }
.inbox-msg-time { font-size:10px; color:#c9cdd4; margin-top:3px; padding:0 4px; }
/* AI 回复面板 */
.inbox-ai-panel { background:#fff; border-top:1px solid #e5e6eb; flex-shrink:0; max-height:340px; display:flex; flex-direction:column; overflow:hidden; }
.inbox-ai-scroll { flex:0 1 auto; overflow-y:auto; min-height:0; }
.inbox-ai-panel-head { padding:10px 14px; border-bottom:1px solid #f2f3f5; display:flex; align-items:center; gap:8px; background:#fafbfc; }
.inbox-ai-reply-box { padding:10px 14px; border-bottom:1px solid #f2f3f5; }
.inbox-ai-reply-text { font-size:13px; line-height:1.75; color:#1d2129; background:#f7f8fa; border-radius:8px; padding:10px 12px; }
.think-panel { margin:0 14px 10px; background:#e8f3ff; border-radius:8px; padding:11px 13px; border-left:3px solid #165DFF; }
.think-panel-label { font-size:11px; font-weight:700; color:#165DFF; margin-bottom:7px; display:flex; align-items:center; justify-content:space-between; }
.think-row { font-size:12px; color:#1d5bd8; line-height:1.7; margin-bottom:3px; }
.inbox-quick-actions { padding:10px 14px; display:flex; gap:7px; flex-wrap:wrap; align-items:center; border-top:1px solid #e5e6eb; background:#fff; flex-shrink:0; box-shadow:0 -4px 12px rgba(15,23,42,.04); }
.inbox-qa-btn { height:30px; padding:'0 12px'; border-radius:7px; font-size:12px; font-weight:500; cursor:pointer; border:1px solid #e5e6eb; background:#fff; color:#4e5969; font-family:inherit; transition:all .12s; display:flex; align-items:center; gap:4px; padding:0 10px; }
.inbox-qa-btn:hover { border-color:#165DFF; color:#165DFF; }
.inbox-qa-btn.primary { background:#165DFF; color:#fff; border-color:#165DFF; }
.inbox-qa-btn.primary:hover { background:#0e42d2; }
.inbox-qa-btn.disabled { opacity:.45; cursor:not-allowed; }
.inbox-qa-btn.disabled:hover { border-color:#e5e6eb; color:#4e5969; }
.score-bar-wrap { display:flex; align-items:center; gap:6px; white-space:nowrap; flex-shrink:0; font-size:11px; }
.score-card { min-width:150px; padding:8px 10px; border:1px solid #ffe4e4; border-radius:12px; background:linear-gradient(135deg,#fff 0%,#fff7f7 100%); box-shadow:0 4px 12px rgba(245,63,63,.06); }
.score-card-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; font-size:11px; color:#86909c; }
.score-card-value { font-size:18px; font-weight:800; color:#f53f3f; line-height:1; }
.score-bar-bg { width:72px; flex-shrink:0; height:7px; background:#f2f3f5; border-radius:999px; overflow:hidden; }
.score-bar-fill { height:7px; border-radius:999px; background:linear-gradient(90deg,#ff7d00,#f53f3f); }
.score-bar-value { font-weight:800; line-height:1; min-width:18px; text-align:right; }
.score-card-sub { margin-top:5px; font-size:10px; color:#f53f3f; font-weight:600; text-align:right; }

/* ── 发布管理 ── */
.pub-layout { flex:1; overflow-y:auto; padding:20px 24px; background:#f7f8fa; }
.pub-tabs { display:flex; background:#fff; border:1px solid #e5e6eb; border-radius:10px; padding:4px; gap:4px; width:fit-content; margin-bottom:16px; }
.pub-tab { padding:6px 20px; border-radius:7px; font-size:13px; font-weight:500; cursor:pointer; color:#4e5969; transition:all .12s; }
.pub-tab.active { background:#165DFF; color:#fff; font-weight:600; }
.risk-banner { background:#fff7e8; border:1px solid #ffd591; border-radius:8px; padding:10px 14px; display:flex; align-items:flex-start; gap:10px; margin-bottom:16px; font-size:12px; line-height:1.65; color:#874d00; }
.accts-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:20px; }
.acct-card { background:#fff; border:1.5px solid #e5e6eb; border-radius:10px; padding:13px; display:flex; flex-direction:column; gap:8px; transition:all .15s; cursor:pointer; }
.acct-card:hover { border-color:#165DFF; }
.acct-card.selected { border-color:#165DFF; background:#e8f3ff; }
.acct-card-top { display:flex; align-items:center; gap:8px; }
.acct-plat-icon { width:28px; height:28px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; }
.acct-cert-badge { font-size:9px; padding:2px 6px; border-radius:8px; font-weight:700; display:inline-flex; align-items:center; gap:2px; }
.cert-ok    { background:#e8ffea; color:#00b42a; }
.cert-none  { background:#f2f3f5; color:#86909c; }
.cert-risk  { background:#fff0f0; color:#f53f3f; }
.queue-card { background:#fff; border:1px solid #e5e6eb; border-radius:10px; overflow:hidden; margin-bottom:10px; }
.queue-card-head { padding:12px 14px; border-bottom:1px solid #f2f3f5; display:flex; align-items:flex-start; gap:10px; }
.queue-platform-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; margin-top:5px; }
.queue-card-body { padding:10px 14px; display:flex; align-items:center; gap:10px; }
.queue-time-badge { font-size:11px; padding:3px 9px; border-radius:6px; font-weight:600; }
.time-scheduled { background:#e8f3ff; color:#165DFF; }
.time-draft { background:#f2f3f5; color:#86909c; }
.time-sending { background:#e8ffea; color:#00b42a; }
.mass-send-area { background:#fff; border:1px solid #e5e6eb; border-radius:10px; padding:16px; }
.mass-target-chips { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px; }
.mass-chip { padding:5px 12px; border-radius:20px; font-size:12px; cursor:pointer; border:1.5px solid #e5e6eb; background:#fff; color:#4e5969; font-weight:500; transition:all .12s; }
.mass-chip.active { background:#165DFF; color:#fff; border-color:#165DFF; }

/* ── 智能体中心 ── */
.agent-layout { flex:1; overflow-y:auto; padding:24px; background:#f7f8fa; }
.agent-wrap { width:min(1200px,100%); margin:0 auto; }
.agent-head { display:flex; align-items:center; gap:10px; margin-bottom:18px; }
.agent-search { height:44px; border:1px solid #e5e6eb; border-radius:9px; background:#fff; display:flex; align-items:center; gap:9px; padding:0 14px; margin-bottom:14px; box-shadow:0 1px 2px rgba(0,0,0,.02); }
.agent-search-icon { color:#86909c; font-size:17px; line-height:1; flex-shrink:0; }
.agent-search input { flex:1; border:none; outline:none; font-size:13px; font-family:inherit; color:#1d2129; background:transparent; }
.agent-search input::placeholder { color:#86909c; }
.agent-filter-row { display:flex; flex-wrap:wrap; align-items:center; gap:8px; margin-bottom:16px; }
.agent-filter-chip { height:30px; padding:0 16px; border:1px solid #e5e6eb; background:#fff; color:#4e5969; border-radius:16px; font-size:13px; font-weight:500; cursor:pointer; font-family:inherit; transition:all .12s; }
.agent-filter-chip:hover { border-color:#165DFF; color:#165DFF; }
.agent-filter-chip.active { background:#165DFF; border-color:#165DFF; color:#fff; box-shadow:0 4px 10px rgba(22,93,255,.16); }
.agent-hint { font-size:12px; color:#86909c; margin-bottom:14px; }
.agent-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:12px; }

function ChatPage({ onGo, seed, personas = [] }) {
  const [persona, setPersona] = useState('pro');
  const [msgs, setMsgs] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [inputMode, setInputMode] = useState('free');
  const [showThink, setShowThink] = useState(null); // msg index
  const [hotCaptureOpen, setHotCaptureOpen] = useState(false);
  const bodyRef = useRef(null);
  const personaList = [...PERSONAS, ...personas];

  useEffect(() => {
    if (bodyRef.current) bodyRef.current.scrollTop = bodyRef.current.scrollHeight;
  }, [msgs, loading]);

  useEffect(() => {
    if (!seed) return;
    setLoading(false);
    setInputMode(seed.mode || 'free');
    if (seed.personaId) setPersona(seed.personaId);
    setMsgs(m => [
      ...m,
      { role:'user', text: seed.prompt },
      { role:'ai', text: seed.reply, comply: seed.comply !== false, think: seed.think || AI_THINK },
    ]);
  }, [seed?.id]);

  const doSend = (text) => {
    const msg = (text || input).trim();
    if (!msg || loading) return;
    setInput('');
    const newMsgs = [...msgs, { role:'user', text: msg }];
    setMsgs(newMsgs);
    setLoading(true);
    setTimeout(() => {
      setMsgs(m => [...m, { role:'ai', text: AI_REPLY, comply:true, think: AI_THINK }]);
      setLoading(false);
    }, 1400);
  };

  const handleRightTool = (tool) => {
    if (!tool || tool.sep) return;
    setInputMode('free');
    setInput('');
    setMsgs(m => [
      ...m,
      { role:'user', text: tool.prompt || `使用${tool.tip}` },
      { role:'ai', text: tool.reply || `已进入「${tool.tip}」模式。`, comply: tool.tip === '合规检测' },
    ]);
    if (tool.action === 'topic' && onGo) {
      setTimeout(() => onGo('topic'), 450);
    }
  };

  const cur = personaList.find(p => p.id === persona) || personaList[0];

  return (
    <div className="chat-layout">
      {/* ── Persona rail ── */}
      <div className="persona-rail">
        <div className="persona-rail-label">选择人设</div>
        {personaList.map(p => (
          <div key={p.id} className={`persona-card ${persona === p.id ? 'active' : ''}`} onClick={() => setPersona(p.id)}>
            <div className="persona-avatar-wrap">
              {p.photo ? <img className="persona-avatar-img" src={p.photo} alt={p.name} /> : p.emoji}
            </div>
            <div className="persona-card-name">{p.name}</div>
          </div>
        ))}
      </div>

      {/* ── Chat center ── */}
      <div className="chat-center">
        <div className="chat-body" ref={bodyRef}>

          {msgs.length === 0 && (
            <>
              <div className="chat-welcome">
                <div className="chat-welcome-row">
                  <div>
                    <h2>下午好，阳阳</h2>
                    <p>
                      当前人设：<span style={{color:'#165DFF',fontWeight:700}}>{cur.name}</span> ·{' '}
                      基于人设 Agent 运作，内容风格和转化策略自动匹配。
                    </p>
                  </div>
                  <HotCaptureNotice
                    open={hotCaptureOpen}
                    onToggle={() => setHotCaptureOpen(v => !v)}
                  />
                </div>
              </div>
              <div className="workbench-strip">
                <div className="workbench-chip" onClick={() => setInputMode('free')}>✦ 自由创作工作台</div>
                <div className="workbench-chip" onClick={() => setInputMode('tpl')}>📋 写作模板下沉入口</div>
                <div className="workbench-chip" onClick={() => setInputMode('persona')}>🤖 人设 Agent 配置</div>
                <div className="workbench-chip" onClick={() => doSend('帮我基于当前人设，生成一套从小红书评论到企微计划书发送的承接话术')}>💬 发企微计划书</div>
              </div>
              <div className="quick-grid">
                {QUICK_TASKS.map((t, i) => (
                  <div key={i} className="quick-card" onClick={() => doSend(t.prompt)}>
                    <div className="quick-icon">
                      <img className="quick-icon-img" src={t.icon} alt={t.label} />
                    </div>
                    <div>
                      <div className="quick-card-label">{t.label}</div>
                      <div className="quick-card-sub">{t.sub}</div>
                    </div>
                  </div>
                ))}
              </div>
            </>
          )}

          {msgs.map((m, i) => (
            <div key={i} className={`msg-row ${m.role === 'user' ? 'user' : ''}`}>
              <div className={`msg-av ${m.role}`}>{m.role === 'ai' ? '✦' : '阳'}</div>
              <div className="msg-content">
                <div className={`msg-bubble ${m.role}`}>{m.text}</div>
                {m.comply && (
                  <div style={{marginTop:6}}>
                    <span className="comply-badge">✓ 合规检测通过 · 无违禁词</span>
                    {m.think && (
                      <span
                        style={{fontSize:11,color:'#165DFF',cursor:'pointer',marginLeft:8,textDecoration:'underline'}}
                        onClick={() => setShowThink(showThink === i ? null : i)}
                      >
                        {showThink === i ? '收起思考过程' : '查看 AI 深度思考'}
                      </span>
                    )}
                  </div>
                )}
                {showThink === i && m.think && (
                  <div className="think-block">
                    <div className="think-block-label">✦ AI 深度思考 · 规划面板</div>
                    <div><b>阶段识别：</b>{m.think.stage}</div>
                    <div style={{marginTop:4}}><b>需求信号：</b>{m.think.signal}</div>
                    <div style={{marginTop:4}}><b>推荐动作：</b>{m.think.action}</div>
                    <div style={{marginTop:4}}><b>合规规则：</b>{m.think.rule}</div>
                  </div>
                )}
                {m.role === 'ai' && (
                  <div style={{display:'flex',gap:6,marginTop:8,flexWrap:'wrap'}}>
                    {['复制', '再生成', '润色', '直接发布', '存草稿'].map(a => (
                      <button key={a} className="attach-btn-mini" style={{height:24,fontSize:10}}>{a}</button>
                    ))}
                  </div>
                )}
              </div>
            </div>
          ))}

          {loading && (
            <div className="msg-row">
              <div className="msg-av ai">✦</div>
              <div className="msg-bubble ai" style={{color:'#86909c',display:'flex',alignItems:'center',gap:8}}>
                <span style={{display:'inline-block',width:14,height:14,border:'2px solid #bcd1ff',borderTopColor:'#165DFF',borderRadius:'50%',animation:'spin .6s linear infinite'}} />
                AI 正在生成中...
              </div>
            </div>
          )}
        </div>

        {/* ── Input area ── */}
        <div className="chat-input-area">
          <div className="input-box-wrap">
            <div className="input-mode-tabs">
              {[['free','自由创作'],['tpl','从模板生成'],['persona','切换人设']].map(([id,label]) => (
                <div key={id} className={`imt ${inputMode === id ? 'active' : ''}`} onClick={() => setInputMode(id)}>{label}</div>
              ))}
            </div>
            <div className="mode-helper">
              <span className="mode-helper-tag">
                {inputMode === 'free' ? '自由创作' : inputMode === 'tpl' ? '模板生成' : '人设切换'}
              </span>
              <span>
                {inputMode === 'free'
                  ? '直接描述内容目标，AI 会按当前人设补齐选题、结构、合规和转化动作。'
                  : inputMode === 'tpl'
                    ? '选择爆款标题、种草笔记、异议处理、企微计划书等模板后生成。'
                  : '切换或调整人设语气、禁区词、销售阶段规则，再继续创作。'}
              </span>
            </div>
            {inputMode === 'tpl' && (
              <div className="embedded-panel">
                <div className="embedded-panel-title">模板快捷选择</div>
                <div className="embedded-chip-row">
                  {[
                    ['种草笔记','帮我按小红书种草笔记模板写一篇年金险内容，包含标题、开头钩子、正文结构和私信引导'],
                    ['爆款标题','帮我生成10个年金险爆款标题，并按点击率预估排序'],
                    ['异议处理','客户质疑利率和缴费期，请生成一段专业但不压迫的异议处理话术'],
                    ['企微计划书','帮我生成企微计划书发送话术，提醒客户先看利益演示再进入投保链接'],
                    ['内容日历','帮我生成7天保险获客内容日历，覆盖热点、知识、人设故事']
                  ].map(([label,prompt]) => (
                    <button key={label} className="embedded-chip" onClick={() => setInput(prompt)}>{label}</button>
                  ))}
                </div>
              </div>
            )}
            {inputMode === 'persona' && (
              <div className="embedded-panel">
                <div className="embedded-panel-title">人设 Agent 配置</div>
                <div className="persona-config-grid">
                  <div className="persona-config-card">
                    <div className="persona-config-label">人设语气</div>
                    <div className="persona-config-value">{cur.name} · {cur.desc}</div>
                  </div>
                  <div className="persona-config-card">
                    <div className="persona-config-label">禁区词</div>
                    <div className="persona-config-value">绝对收益 / 保本 / 稳赚 / 最高收益</div>
                  </div>
                  <div className="persona-config-card">
                    <div className="persona-config-label">销售阶段规则</div>
                    <div className="persona-config-value">先计划书，再解锁投保链接</div>
                  </div>
                </div>
                <div className="url-learn-row">
                  <span className="mode-helper-tag">爆款URL学习</span>
                  <input className="url-learn-input" placeholder="粘贴小红书/抖音爆款 URL，学习结构与语气" />
                  <button className="embedded-chip" onClick={() => setInput('请学习这个爆款URL的标题钩子、正文节奏和转化点，并生成同风格保险内容')}>学习并生成</button>
                </div>
              </div>
            )}
            <textarea
              className="chat-ta"
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); } }}
              placeholder={`输入你的需求，或点击上方快捷任务…  Enter 发送  Shift+Enter 换行`}
            />
            <div className="input-footer-row">
              <button className="attach-btn-mini">📷 上传图片</button>
              <button className="attach-btn-mini">📎 附件</button>
              <button className="attach-btn-mini">🏷️ 选择产品</button>
              <span style={{fontSize:11,color:'#c9cdd4',marginLeft:'auto'}}>{input.length} / 5000 token</span>
              <button
                className="send-circle-btn"
                disabled={!input.trim() || loading}
                onClick={() => doSend()}
              >→</button>
            </div>
          </div>
          <div className="input-hint">每次对话消耗 1 权益分 · 内容由 AI 生成，仅供参考，请遵守相关法律法规及平台规则</div>
        </div>
      </div>

      {/* ── Right tools ── */}
      <div className="right-tools">
        {RIGHT_TOOLS.map((t, i) =>
          t.sep
            ? <div key={i} className="rt-sep" />
            : (
              <div key={i} className={`rt-btn ${t.active ? 'active' : ''}`} onClick={() => handleRightTool(t)}>
                <span className="rt-icon">{t.e}</span>
                <span className="rt-label">{t.tip}</span>
              </div>
            )
        )}
      </div>
    </div>
  );
}

function BarChart({ acct }) {
  const days = ['5/8','5/9','5/10','5/11','5/12','5/13','5/14'];
  const raw = BAR_DATA_SETS[acct] || BAR_DATA_SETS.all;
  const max = Math.max(...raw);
  return (
    <div className="bar-chart">
      {raw.map((v, i) => (
        <div key={i} className="bar-col-wrap">
          <div className="bar-val">{v}</div>
          <div className="bar-item bar-all" style={{height: `${(v/max)*72}px`}} />
          <div className="bar-day">{days[i]}</div>
        </div>
      ))}
    </div>
  );
}

function makePortrait({ bg, skin, hair, shirt, accent }) {
  const svg = `
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
      <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
          <stop stop-color="${bg}" offset="0"/>
          <stop stop-color="#ffffff" offset="1"/>
        </linearGradient>
      </defs>
      <rect width="80" height="80" rx="40" fill="url(#bg)"/>
      <circle cx="40" cy="35" r="18" fill="${skin}"/>
      <path d="M22 34c2-15 12-23 25-20 9 2 15 9 14 20-5-6-12-9-21-9-7 0-13 3-18 9z" fill="${hair}"/>
      <path d="M23 59c4-11 12-16 17-16s13 5 17 16v7H23v-7z" fill="${shirt}"/>
      <circle cx="33" cy="35" r="2" fill="#1d2129"/>
      <circle cx="47" cy="35" r="2" fill="#1d2129"/>
      <path d="M34 44c4 3 8 3 12 0" stroke="${accent}" stroke-width="2" fill="none" stroke-linecap="round"/>
    </svg>
  `;
  return `data:image/svg+xml;utf8,${encodeURIComponent(svg)}`;
}

  const msgsRef = useRef(null);

  const conv = CONVS.find(c => c.id === activeConv);
  const isPlanSent = planSent[activeConv] || conv?.planSent;
  const activeMsgs = inboxMessages[activeConv] || conv?.msgs || [];

  const filteredConvs = CONVS.filter(c =>
    filter === 'all' ? true :
    filter === 'high' ? c.intent === 'high' :
    filter === 'wake' ? !!c.wakeIn : false
  );

  useEffect(() => {
    setShowThink(false);
    setReplying(false);

  }, [activeConv, inboxMessages]);

    setInboxMessages(prev => ({...prev, [activeConv]: [...(prev[activeConv] || conv?.msgs || []), { r:'self', t:text }]}));

}

              mode: 'tpl',
              prompt: `使用写作模板「${tpl.title}」`,
              reply: `已填入「${catInfo?.label || '写作模板'}」模板：${tpl.title}\n\n模板内容：${tpl.preview}\n\n建议替换 [产品名] 为「蛮好的人生」，并结合当前人设补充真实故事、合规表述和私信承接动作。`,
            })} /></div>
            <div style={{display: page==='agent'  ? 'flex' : 'none', flex:1, overflow:'hidden'}}><AgentPage onUseAgent={useAgentInCreation} /></div>
            <div style={{display: page==='pub'    ? 'flex' : 'none', flex:1, overflow:'hidden'}}><PublishPage /></div>
            <div style={{display: page==='inbox'   ? 'flex' : 'none', flex:1, overflow:'hidden'}}><InboxPage /></div>
            <div style={{display: page==='clients' ? 'flex' : 'none', flex:1, overflow:'hidden'}}><ClientsPage /></div>
            <div style={{display: page==='follow'  ? 'flex' : 'none', flex:1, overflow:'hidden'}}><FollowPage /></div>
            {!['chat','data','topic','aigen','tpl','agent','pub','inbox','clients','follow'].includes(page) && (
              <div style={{display:'flex',flex:1,overflow:'hidden'}}>
                <PlaceholderPage page={page} onGo={goPage} />
              </div>
            )}
          </div>
        </div>
      </div>

      {/* Floating viral card */}
      {showViral && <ViralFloatCard onClose={() => setShowViral(false)} onFill={(hot) => {
        setShowViral(false);
        fillCreationCenter({
          prompt: `填入同类爆款：${hot.title}`,
          reply: `已将同类爆款填入创作中心。\n\n爆款标题：${hot.title}\n数据表现：${hot.meta}\nAI拆解：降息焦虑 + 个人故事植入，结构清晰，情绪节奏强。\n\n可直接改写为：普通家庭面对利率下降，如何用年金险锁定长期现金流，并引导私信领取利益演示。`,
        });
      }} />}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
